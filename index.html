

<!DOCTYPE html>
<html>

<head>
    <title>Library Project</title>
    <link rel = "stylesheet" href = "style.css" >
  
</head>

<body>

    <div class = "background"></div>

    <div class = "heading">
    <h2>Library book management system </h2>
    </div>

    <div class = "mainButton">
     <button id = "openFormBtn">
      
        <span class = "plus">+</span>
        <span class = "text">Add a Book to library </span>
    
    </button>

    </div>

       <div class = "formContainer" >
             <div> Title  <input id = "title"></div>  
             <div> authorName : <input id = "authorName">  </div>
             <div> category :   <input id = "category"> </div>
             <div> description :<input id = "description"> </div>

             <div>
                status :

                <select id = "status">
                    <option value = "Read ✅"> Read ✅</option>
                    <option value = "Not Read yet 😔"> Not Read yet 😔</option>
                </select>
             </div>

        <button id = "Add"> Add </button>
        <button id = "Back"> Cancel </button>          
    </div>

    <div id = "BookContainer"></div>

    
</body>

  <script src="script.js"></script>
